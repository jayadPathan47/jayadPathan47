<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 740" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;family=Fira+Code:wght@400;500;700&amp;family=Inter:wght@400;600;700;800&amp;display=swap');

      /* Animations */
      @keyframes pulseOrb {
        0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.4; }
        50% { transform: scale(1.15) translate(30px, -20px); opacity: 0.6; }
      }
      @keyframes floatParticle {
        0% { transform: translateY(0px) scale(1); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
      }
      @keyframes flickerNeon {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
          opacity: 1;
          filter: drop-shadow(0 0 2px #d90429) drop-shadow(0 0 8px #7209b7);
        }
        20%, 24%, 55% {
          opacity: 0.3;
          filter: none;
        }
      }
      @keyframes typing {
        from { width: 0; }
        to { width: 100%; }
      }
      @keyframes blink {
        50% { border-color: transparent; }
      }
      @keyframes hologramReveal {
        0% { clip-path: inset(100% 0 0 0); opacity: 0; }
        100% { clip-path: inset(0% 0 0 0); opacity: 1; }
      }
      @keyframes hologramScan {
        0% { transform: translateY(-50px); opacity: 0.2; }
        50% { opacity: 1; }
        100% { transform: translateY(640px); opacity: 0.2; }
      }
      @keyframes letterPop {
        0% { opacity: 0; transform: scale(0.3) translateY(20px); }
        70% { transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes roleCycle {
        0%, 20% { opacity: 0; transform: translateY(10px); }
        25%, 45% { opacity: 1; transform: translateY(0); }
        50%, 70% { opacity: 0; transform: translateY(-10px); }
        75%, 95% { opacity: 0; transform: translateY(10px); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes swingLanyard {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-1.5deg); }
        50% { transform: rotate(1.5deg); }
      }
      @keyframes progressAnim {
        from { stroke-dashoffset: 280; }
        to { stroke-dashoffset: var(--target); }
      }

      /* Global Styles */
      .banner-bg {
        fill: url(#bg-grad);
      }
      .grid-pattern {
        fill: url(#dot-grid);
        opacity: 0.08;
      }
      .neon-text {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        animation: flickerNeon 4s infinite;
      }
      .letter {
        display: inline-block;
        opacity: 0;
        animation: letterPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      .type-line {
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid #d90429;
        width: 0;
        animation: typing 2.5s steps(30, end) 0.5s forwards, blink 0.75s step-end infinite;
      }
      .role-1 { animation: roleCycle 8s infinite 0s; }
      .role-2 { animation: roleCycle 8s infinite 4s; }
      .hologram-char {
        animation: hologramReveal 1.8s ease-out forwards;
      }
      .scan-line {
        animation: hologramScan 3.5s linear infinite;
        stroke-width: 3;
        stroke: #d90429;
        filter: drop-shadow(0 0 8px #d90429);
      }
      .skill-pill {
        opacity: 0;
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .skill-pill:hover {
        transform: scale(1.05) translateY(-2px);
      }
      .animated-stat-bar {
        stroke-dasharray: 280;
        animation: progressAnim 1.5s ease-out forwards 2s;
      }
    </style>

    <!-- Background Gradients -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f2eaf7" />
      <stop offset="100%" stop-color="#fbf8fd" />
    </radialGradient>

    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d90429" />
      <stop offset="100%" stop-color="#7209b7" />
    </linearGradient>

    <!-- Dot Pattern -->
    <pattern id="dot-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#d90429" />
    </pattern>

    <!-- Character Glow Filter -->
    <filter id="char-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1280" height="740" rx="20" class="banner-bg" />
  <rect width="1280" height="740" rx="20" class="grid-pattern" />

  <!-- Ambient Pulsing Orbs -->
  <circle cx="200" cy="150" r="180" fill="#d90429" filter="blur(80px)" style="animation: pulseOrb 8s infinite ease-in-out;" />
  <circle cx="1000" cy="500" r="220" fill="#7209b7" filter="blur(95px)" style="animation: pulseOrb 10s infinite ease-in-out 1s;" />
  <circle cx="640" cy="370" r="150" fill="#3a0ca3" filter="blur(85px)" style="animation: pulseOrb 7s infinite ease-in-out 3s;" />

  <!-- Floating particles (Rising up) -->
  <g opacity="0.3">
    <circle cx="120" cy="600" r="3" fill="#d90429" style="animation: floatParticle 6s infinite linear;" />
    <circle cx="340" cy="620" r="2" fill="#7209b7" style="animation: floatParticle 8s infinite linear 1.5s;" />
    <circle cx="480" cy="590" r="4" fill="#1f1a24" style="animation: floatParticle 5s infinite linear 0.5s;" />
    <circle cx="820" cy="610" r="3" fill="#d90429" style="animation: floatParticle 7s infinite linear 2.5s;" />
  </g>

  <!-- Left Side: Terminal & Content -->
  <g transform="translate(50, 40)">
    <!-- Terminal window -->
    <rect width="600" height="40" rx="8" fill="#e5dbed" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1.5" />
    <!-- OS buttons -->
    <circle cx="25" cy="20" r="6" fill="#ff5f56" />
    <circle cx="45" cy="20" r="6" fill="#ffbd2e" />
    <circle cx="65" cy="20" r="6" fill="#27c93f" />
    <!-- Terminal Header Text -->
    <text x="325" y="25" font-family="'Fira Code', monospace" font-size="12" fill="#5c5464" text-anchor="middle" font-weight="500">iamgajanan70 - README.md</text>

    <!-- Main Content Panel -->
    <rect x="0" y="40" width="600" height="610" rx="8" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1.5" style="backdrop-filter: blur(10px);"/>

    <!-- Command line -->
    <text x="30" y="85" font-family="'Fira Code', monospace" font-size="14" fill="#1f1a24" font-weight="bold">
      <tspan fill="#d90429">user@dev</tspan>:<tspan fill="#7209b7">~$</tspan> cat README.md
    </text>

    <!-- Script Font Name with Gradient and Pop-in letters -->
    <text x="30" y="160" font-family="'Dancing Script', cursive, sans-serif" font-size="52" fill="url(#primary-grad)" font-weight="bold">
      <tspan class="letter" style="animation-delay: 1s">G</tspan><tspan class="letter" style="animation-delay: 1.1s">a</tspan><tspan class="letter" style="animation-delay: 1.2s">j</tspan><tspan class="letter" style="animation-delay: 1.3s">a</tspan><tspan class="letter" style="animation-delay: 1.4s">n</tspan><tspan class="letter" style="animation-delay: 1.5s">a</tspan><tspan class="letter" style="animation-delay: 1.6s">n</tspan><tspan dx="15">&#160;</tspan><tspan class="letter" style="animation-delay: 1.8s">W</tspan><tspan class="letter" style="animation-delay: 1.9s">a</tspan><tspan class="letter" style="animation-delay: 2s">i</tspan><tspan class="letter" style="animation-delay: 2.1s">c</tspan><tspan class="letter" style="animation-delay: 2.2s">h</tspan><tspan class="letter" style="animation-delay: 2.3s">a</tspan><tspan class="letter" style="animation-delay: 2.4000000000000004s">l</tspan><tspan class="letter" style="animation-delay: 2.5s">e</tspan>
    </text>

    <!-- Cycling Typed Roles -->
    <g transform="translate(30, 205)">
      <!-- Background bracket for role -->
      <text x="0" y="0" font-family="'Fira Code', monospace" font-size="16" fill="#5c5464">
        Role: <tspan fill="#1f1a24" font-weight="bold" class="role-1">[ Full Stack Developer ]</tspan>
        <tspan fill="#1f1a24" font-weight="bold" class="role-2" dx="-185">[ Creative Craftsman ]</tspan>
      </text>
    </g>

    <!-- Typed Quote Box (Tagline) -->
    <g transform="translate(30, 235)">
      <rect width="360" height="42" rx="6" fill="rgba(255, 42, 133, 0.05)" stroke="#d90429" stroke-dasharray="4,4" stroke-width="1.5"/>
      <text x="15" y="26" font-family="'Fira Code', monospace" font-size="14" fill="#d90429" font-weight="bold">
        ⚡ "I am cursed !"
      </text>
    </g>

    <!-- About Me Lines -->
    <g transform="translate(30, 310)" font-family="'Inter', sans-serif" font-size="13" fill="#1f1a24">
      <text x="0" y="0" font-weight="bold" font-size="15" fill="#7209b7">ABOUT ME</text>
      <text x="0" y="25" fill="#1f1a24">🚀 Building state-of-the-art Full Stack Web Applications</text>
      <text x="0" y="48" fill="#1f1a24">🎨 Crafting micro-interactions with Framer, Motion, and CSS</text>
      <text x="0" y="71" fill="#1f1a24">🎯 Obsessed with pixel-perfect designs, performance &amp; UX</text>
    </g>

    <!-- Animated local stats bar -->
    <g transform="translate(30, 420)">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#5c5464">SKILLS AGILITY LEVEL</text>
      <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255, 255, 255, 0.1)"/>
      <rect x="0" y="10" width="280" height="8" rx="4" fill="url(#primary-grad)"/>
      <text x="290" y="22" font-family="'Fira Code', monospace" font-size="12" font-weight="bold" fill="#d90429" text-anchor="end">95%</text>
    </g>
  </g>

  <!-- Skills Pills inside left content -->
  <g>
    
      <g class="skill-pill" transform="translate(50, 490)" style="animation-delay: 2s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">HTML</text>
      </g>
    
      <g class="skill-pill" transform="translate(165, 490)" style="animation-delay: 2.15s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">CSS</text>
      </g>
    
      <g class="skill-pill" transform="translate(280, 490)" style="animation-delay: 2.3s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">JS</text>
      </g>
    
      <g class="skill-pill" transform="translate(395, 490)" style="animation-delay: 2.45s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">NODE JS</text>
      </g>
    
      <g class="skill-pill" transform="translate(50, 525)" style="animation-delay: 2.6s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">C</text>
      </g>
    
      <g class="skill-pill" transform="translate(165, 525)" style="animation-delay: 2.75s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">C++</text>
      </g>
    
      <g class="skill-pill" transform="translate(280, 525)" style="animation-delay: 2.9s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">JAVA</text>
      </g>
    
      <g class="skill-pill" transform="translate(395, 525)" style="animation-delay: 3.05s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">ADV. JAVA</text>
      </g>
    
      <g class="skill-pill" transform="translate(50, 560)" style="animation-delay: 3.2s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">JMETER</text>
      </g>
    
      <g class="skill-pill" transform="translate(165, 560)" style="animation-delay: 3.3499999999999996s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">JENKINS</text>
      </g>
    
      <g class="skill-pill" transform="translate(280, 560)" style="animation-delay: 3.5s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">FIGMA</text>
      </g>
    
      <g class="skill-pill" transform="translate(395, 560)" style="animation-delay: 3.65s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">FRAMER</text>
      </g>
    
      <g class="skill-pill" transform="translate(50, 595)" style="animation-delay: 3.8s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">CANVA</text>
      </g>
    
      <g class="skill-pill" transform="translate(165, 595)" style="animation-delay: 3.95s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">GITHUB</text>
      </g>
    
      <g class="skill-pill" transform="translate(280, 595)" style="animation-delay: 4.1s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">TYPESCRIPT</text>
      </g>
    
      <g class="skill-pill" transform="translate(395, 595)" style="animation-delay: 4.25s">
        <rect width="105" height="26" rx="13" fill="rgba(255, 255, 255, 0.7)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1"/>
        <text x="52" y="17" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1f1a24" text-anchor="middle">PYTHON</text>
      </g>
    
  </g>

  <!-- Neon sign on bottom right -->
  <g transform="translate(450, 670)">
    <text x="0" y="15" class="neon-text" font-family="'Inter', sans-serif" font-size="14" fill="#d90429" text-anchor="middle" letter-spacing="3">
      ⚡ KEEP CODING KEEP GROWING ⚡
    </text>
  </g>

  <!-- Right Side: Code Editor Card -->
  <g transform="translate(680, 40)">
    <!-- Window Container -->
    <rect width="550" height="240" rx="10" fill="rgba(10, 5, 20, 0.85)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1.5" style="backdrop-filter: blur(8px);" />
    <rect width="550" height="30" rx="10" fill="#e5dbed" />
    <circle cx="20" cy="15" r="5" fill="#ff5f56" />
    <circle cx="35" cy="15" r="5" fill="#ffbd2e" />
    <circle cx="50" cy="15" r="5" fill="#27c93f" />
    <text x="275" y="20" font-family="'Fira Code', monospace" font-size="10" fill="#5c5464" text-anchor="middle">buildDreams.tsx</text>

    <!-- Visual Editor Typing Text -->
    <g transform="translate(25, 60)" font-family="'Fira Code', monospace" font-size="11.5" font-weight="500">
      <text x="0" y="15" fill="#e27c89">const <tspan fill="#61afef">buildDreams</tspan> = () => {</text>
      <text x="20" y="35" fill="#e27c89">const <tspan fill="#abb2bf">steps</tspan> = [</text>
      <text x="40" y="55" fill="#98c379">"Code Daily"</tspan>,</text>
      <text x="40" y="75" fill="#98c379">"Refactor Always"</tspan>,</text>
      <text x="40" y="95" fill="#98c379">"Stay Cursed to Grow"</tspan></text>
      <text x="20" y="115" fill="#abb2bf">];</text>
      <text x="20" y="140" fill="#c678dd">return <tspan fill="#abb2bf">steps.map(</tspan><tspan fill="#e5c07b">step</tspan><tspan fill="#c678dd"> =&gt; </tspan><tspan fill="#abb2bf">step.execute());</tspan></text>
      <text x="0" y="165" fill="#abb2bf">};</text>
      <text x="0" y="190" fill="#5c6370">// Code never sleeps, keep building...</text>
    </g>
  </g>

  <!-- Right Side: Anime Character Showcase inside a clipped group with scanning animations -->
  <g transform="translate(685, 300)">
    <!-- Background Frame for Character -->
    <rect width="540" height="350" rx="15" fill="rgba(255, 42, 133, 0.02)" stroke="rgba(114, 9, 183, 0.15)" stroke-width="1.5" />
    
    <!-- Clipped Character Area -->
    <clipPath id="char-clip">
      <rect width="540" height="350" rx="15" />
    </clipPath>
    
    <g clip-path="url(#char-clip)">
      <!-- Aura circles behind character -->
      <circle cx="270" cy="180" r="140" fill="#d90429" opacity="0.15" filter="blur(40px)" />
      <circle cx="270" cy="180" r="90" fill="#7209b7" opacity="0.2" filter="blur(25px)" />

      <!-- The Base64 Character Image -->
      <image href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='450' height='350' viewBox='0 0 450 350'><rect width='450' height='350' fill='rgba(255,42,133,0.1)' rx='10'/><text x='225' y='160' fill='%23ff2a85' font-family='sans-serif' font-size='16' text-anchor='middle' font-weight='bold'>iamgajanan70 Character</text><text x='225' y='190' fill='%23b1a7bc' font-family='sans-serif' font-size='12' text-anchor='middle'>Drag &amp; drop character in UI to crop background</text></svg>" 
             x="45" y="-10" width="450" height="360" class="hologram-char" filter="url(#char-glow)" preserveAspectRatio="xMidYMid meet"/>

      <!-- Continuously Sweeping Scan Line -->
      <line x1="0" y1="0" x2="540" y2="0" class="scan-line" />
    </g>
  </g>
</svg>